# Ultralytics BoT-SORT configuration optimized for vehicle counting
# See https://docs.ultralytics.com/modes/track/

tracker_type: botsort  # tracker type: botsort or bytetrack

# BoT-SORT-specific settings for stable vehicle tracking
track_high_thresh: 0.5  # threshold for first association (0.5 is standard, was 0.3)
track_low_thresh: 0.1   # threshold for second association
new_track_thresh: 0.6   # threshold for new track initialization (0.6 is standard, was 0.4)
track_buffer: 30        # frames to keep lost tracks (1 sec @ 30fps) - Lower reduces ghosting
match_thresh: 0.8       # IoU threshold for matching

# ReID (Re-identification) - helps recover lost tracks
with_reid: false        # disable ReID for now (requires additional model)

# Motion compensation
gmc_method: sparseOptFlow  # Global Motion Compensation method

# Proximity threshold for association
proximity_thresh: 0.5
appearance_thresh: 0.25

# Confidence fusion
fuse_score: true
